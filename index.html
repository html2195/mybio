<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/jpeg" href="./assets/avatar.jpg?v=3">
  <link rel="shortcut icon" type="image/jpeg" href="./assets/avatar.jpg?v=3">
  <title>Squerxx — bio</title>
  <meta name="description" content="Windows Mica style bio page with a soft blurred fog background, quiet rain and stellar music." />
  <meta property="og:title" content="Squerxx — bio" />
  <meta property="og:description" content="Young developer · Python · Node.js" />
  <meta property="og:image" content="assets/foggy-city.jpg" />

  <link rel="preload" href="assets/foggy-city.jpg" as="image" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="scene" aria-hidden="true">
    <div class="scene__image"></div>
    <div class="scene__fog scene__fog--one"></div>
    <div class="scene__fog scene__fog--two"></div>
    <div class="scene__rain"></div>
    <div class="scene__grain"></div>
  </div>

  <section class="entry" id="entry">
    <div class="mini-window">
      <div class="mini-window__bar">
        <span class="win-dot win-dot--blue"></span>
        <span class="mini-title">squerxx.exe</span>
        <button class="mini-close" type="button" aria-label="close preview">×</button>
      </div>

      <div class="mini-window__body">
        <div class="mini-avatar" aria-label="avatar"></div>
        <h2>Squerxx</h2>
        <p>click to enter</p>
      </div>
    </div>
  </section>

  <main class="page">
    <article class="profile-window" id="card">
      <header class="titlebar">
        <div class="titlebar__left">
          <span class="app-dot"></span>
          <span class="app-title">squerxx.exe</span>
        </div>

        <div class="titlebar__controls" aria-label="window controls">
          <button class="win-control win-control--min" type="button" aria-label="minimize"></button>
          <button class="win-control win-control--max" type="button" aria-label="maximize"></button>
          <button class="win-control win-control--close" type="button" aria-label="close"></button>
        </div>
      </header>

      <section class="profile">
        <div class="avatar" aria-label="avatar">
          <span aria-hidden="true"></span>
        </div>

        <p class="eyebrow"></p>
        <h1>Squerxx</h1>
        <p class="tagline" id="typed">Ukraine · depression · teenager</p>

        <div class="skill-grid" aria-label="profile tags">
          <button type="button" class="skill-card">
            <span>01</span>
            <b>Young developer</b>
          </button>
          <button type="button" class="skill-card">
            <span>02</span>
            <b>Python</b>
          </button>
          <button type="button" class="skill-card">
            <span>03</span>
            <b>Node.js</b>
          </button>
        </div>

        <nav class="links" aria-label="social links">
          <a class="link-card" href="https://github.com/html2195" target="_blank" rel="noopener noreferrer">
            <span class="link-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M12 .7A11.3 11.3 0 0 0 .7 12.3c0 5.1 3.3 9.4 7.9 10.8.6.1.8-.3.8-.6v-2.1c-3.2.7-3.9-1.4-3.9-1.4-.5-1.3-1.3-1.7-1.3-1.7-1.1-.7.1-.7.1-.7 1.2.1 1.8 1.2 1.8 1.2 1 .1.8 2.1 3.2 1.5.1-.8.4-1.3.7-1.6-2.6-.3-5.3-1.3-5.3-5.7 0-1.3.5-2.3 1.2-3.1-.1-.3-.5-1.5.1-3.1 0 0 1-.3 3.2 1.2A11 11 0 0 1 12 6.6c1 0 1.9.1 2.8.4C17 5.5 18 5.8 18 5.8c.6 1.6.2 2.8.1 3.1.8.8 1.2 1.8 1.2 3.1 0 4.4-2.7 5.4-5.3 5.7.4.4.8 1.1.8 2.2v3.2c0 .3.2.7.8.6a11.6 11.6 0 0 0 7.8-10.8A11.3 11.3 0 0 0 12 .7Z"/></svg>
            </span>
            <span>
              <b>GitHub</b>
              <small>github.com/html2195</small>
            </span>
            <em>open</em>
          </a>

          <a class="link-card" href="https://t.me/deluser0" target="_blank" rel="noopener noreferrer">
            <span class="link-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M21.7 4.4 18.4 20c-.2 1.1-.9 1.4-1.9.9l-5.2-3.8-2.5 2.4c-.3.3-.5.5-1 .5l.3-5.3 9.7-8.8c.4-.4-.1-.6-.7-.2L5.2 13.2.1 11.6c-1.1-.3-1.1-1.1.2-1.6L20.2 2.3c.9-.3 1.7.2 1.5 2.1Z"/></svg>
            </span>
            <span>
              <b>Telegram</b>
              <small>@deluser0</small>
            </span>
            <em>open</em>
          </a>

          <a class="link-card" href="https://steamcommunity.com/id/Bananaboy200952" target="_blank" rel="noopener noreferrer">
            <span class="link-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M12 1a11 11 0 0 0-11 10.6l5.9 2.5a3 3 0 0 1 1.7-.5l2.7-4v-.1a4.1 4.1 0 1 1 4.1 4.1h-.1l-3.9 2.8a3 3 0 0 1-5.9.8L1.2 15.4A11 11 0 1 0 12 1Zm-3.5 17.8a2.1 2.1 0 0 0 1.9-3l-1.2-.5c.4.8.1 1.7-.7 2.1-.8.3-1.7 0-2-.7l-.9-.4a2.1 2.1 0 0 0 2.9 2.5Zm6.9-6.7a2.7 2.7 0 1 0 0-5.4 2.7 2.7 0 0 0 0 5.4Zm0-.7a2 2 0 1 1 0-4 2 2 0 0 1 0 4Z"/></svg>
            </span>
            <span>
              <b>Steam</b>
              <small>Bananaboy200952</small>
            </span>
            <em>open</em>
          </a>

          <button class="link-card link-card--button" id="discordCopy" type="button">
            <span class="link-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M19.7 4.9A17.7 17.7 0 0 0 15.3 3l-.2.4c1.6.5 2.4 1.1 3.2 1.7a13.6 13.6 0 0 0-12.6 0c.8-.6 1.8-1.2 3.2-1.7L8.7 3a17.7 17.7 0 0 0-4.4 1.9C1.6 8.9.9 12.8 1.2 16.6A17.8 17.8 0 0 0 6.6 19.4l.7-1.1c-1.2-.4-2.2-1-3.1-1.8l.7.4a14.6 14.6 0 0 0 14.2 0l.7-.4c-.9.8-2 1.4-3.1 1.8l.7 1.1a17.8 17.8 0 0 0 5.4-2.8c.4-4.4-.7-8.2-3.1-11.7ZM8.4 14.2c-1.1 0-2-1-2-2.1s.9-2.1 2-2.1 2 1 2 2.1-.9 2.1-2 2.1Zm7.2 0c-1.1 0-2-1-2-2.1s.9-2.1 2-2.1 2 1 2 2.1-.9 2.1-2 2.1Z"/></svg>
            </span>
            <span>
              <b>Discord</b>
              <small id="discordText">twizzy_daster</small>
            </span>
            <em>copy</em>
          </button>
        </nav>

        <section class="audio-panel" aria-label="audio player">
          <div class="player-head">
            <button class="play" id="play" type="button" aria-label="play or pause">
              <span id="playIcon">▶</span>
            </button>

            <div class="track">
              <div class="track__top">
                <b>stellar</b>
                <span id="time">00:00 / 00:00</span>
              </div>
              <div class="bar" id="bar" role="slider" aria-label="music progress" tabindex="0">
                <span id="progress"></span>
                <i id="progressThumb"></i>
              </div>
              <div class="track__bottom">
                <span>rain ambience enabled</span>
                <span>soft mode</span>
              </div>
            </div>
          </div>

          <div class="player-controls">
            <button class="chip" id="rewind" type="button">−10s</button>
            <button class="chip" id="rainToggle" type="button">rain on</button>
            <button class="chip" id="forward" type="button">+10s</button>
            <button class="chip" id="mute" type="button">sound</button>
          </div>

          <div class="volume">
            <span>vol</span>
            <input id="volume" type="range" min="0" max="100" value="48" aria-label="master volume" />
            <span id="volumeValue">48%</span>
          </div>
        </section>

        <div class="search-pill" aria-label="search phrase">
          <span class="search-icon" aria-hidden="true"></span>
          <span class="search-typing" id="searchTyping"></span>
          <button class="key-btn" type="button" aria-label="command key">⌘</button>
          <button class="key-btn" type="button" aria-label="K key">K</button>
        </div>
      </section>
    </article>
  </main>

  <audio id="musicAudio" src="assets/stellar.mp3" preload="metadata" loop></audio>
  <audio id="rainAudio" src="assets/rain.mp3" preload="auto" loop></audio>

  <script src="script.js"></script>
</body>
</html>
